# Experiment: qwen_v1 — baseline run, matching original Colab hyperparameters
# To run a new experiment: copy this file, rename (e.g. qwen_v2.yaml), edit, commit, git pull in Colab.
run_name: "qwen_emotional_v1"

model:
  name: "unsloth/Qwen2.5-1.5B-Instruct-unsloth-bnb-4bit"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4   # effective batch size = 8
  warmup_steps: 50
  max_steps: 500
  learning_rate: 2e-4
  fp16: true
  logging_steps: 10
  save_steps: 100

data:
  input_jsonl: "output/unsloth_chatml.jsonl"

prompt:
  system_file: "training/prompts/system_v1.txt"

output:
  dir: "lora_outputs/{run_name}"
  push_to_hub: false            # set to true once HF repo is ready
  hub_repo: "your-hf-username/qwen-emotional-coach"
  hub_private: true

wandb:
  enabled: false                # set to true after `wandb login`
  project: "emotional-coach"
